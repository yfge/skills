name: Build Catalog

on:
  workflow_dispatch:
  schedule:
    - cron: "0 3 * * *"
  push:
    branches:
      - main
    paths:
      - "skills/**/SKILL.md"
      - "scripts/build_catalog.py"
      - "scripts/build_quality_report.py"
      - "scripts/validate_skill_quality.py"
      - ".github/workflows/build-catalog.yml"

permissions:
  contents: write

jobs:
  build:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Validate skill quality
        run: python3 scripts/validate_skill_quality.py

      - name: Build catalog
        run: python3 scripts/build_catalog.py

      - name: Build quality report
        run: python3 scripts/build_quality_report.py

      - name: Commit catalog if changed
        run: |
          if git diff --quiet -- catalog/skills.json catalog/skills.csv INDEX.md quality/quality-report.md quality/quality-summary.json; then
            echo "No catalog changes."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add catalog/skills.json catalog/skills.csv INDEX.md quality/quality-report.md quality/quality-summary.json
          git commit -m "chore: refresh skill catalog and quality report"
          git push
