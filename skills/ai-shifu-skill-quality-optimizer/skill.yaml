schema_version: "1.0"
name: "ai-shifu-skill-quality-optimizer"
slug: "ai-shifu-skill-quality-optimizer"
one_liner: "Audit and improve skill repository quality with blocker-first remediation and regression checks."
description: "Audits and improves skill repository quality with issue severity grading, minimal safe remediation, and regression validation."
category: "quality-assurance"
target_users:
  - "Skill library maintainers"
  - "Learning workflow engineers"
  - "AI operations owners"
primary_problem: "Without a stable quality loop, skill metadata and execution consistency drift over time."
inputs:
  - name: "skill_scope"
    type: "text|json"
    required: true
    description: "Skill set to audit: one skill or the entire repository."
  - name: "optimization_policy"
    type: "json"
    required: false
    description: "Constraints such as blocker-only mode or strict edit scope."
outputs:
  - name: "quality_issue_list"
    type: "json"
    required: true
    description: "Issue list grouped by blocker and suggestion severity."
  - name: "remediation_plan"
    type: "markdown"
    required: true
    description: "Minimal safe remediation plan with priority order."
  - name: "regression_result"
    type: "json"
    required: true
    description: "Regression command outcomes and pass status."
tech_stack:
  languages:
    - "markdown"
    - "yaml"
    - "python"
  runtime:
    - "codex-skill"
