schema_version: "1.0"
name: "ai-shifu-lesson-script-generator"
slug: "ai-shifu-lesson-script-generator"
one_liner: "Generate runnable lesson-level MarkdownFlow scripts from structured lesson inputs."
description: "Generates runnable lesson-level MarkdownFlow teaching prompts from structured lesson segments, with safe interaction logic and stable variable reuse."
category: "lesson-script-generation"
target_users:
  - "Instructional designers"
  - "Course content creators"
  - "Learning experience engineers"
primary_problem: "Convert structured lesson inputs into runnable, pedagogically coherent MarkdownFlow scripts."
language_resolution:
  allow_any_language: true
  bcp47_recommended: true
  priority:
    - "explicit_output_language_request"
    - "target_language_parameter"
    - "session_language_preference"
    - "prompt_language_detection"
    - "source_material_dominant_language"
    - "default_fallback_language"
  default_fallback_language: "en-US"
inputs:
  - name: "structured_lesson_segments"
    type: "json"
    required: true
    description: "Preprocessed and segmented lesson data."
  - name: "teaching_constraints"
    type: "json"
    required: false
    description: "Constraints for pacing, interactions, and cross-lesson variable strategy."
  - name: "target_language"
    type: "text"
    required: false
    description: "Requested output language tag (BCP-47 recommended, for example `fr-FR` or `ja-JP`)."
  - name: "bilingual_output"
    type: "boolean"
    required: false
    description: "Whether to output bilingual content instead of single-target language content."
  - name: "term_policy"
    type: "text"
    required: false
    description: "Terminology policy: `preserve`, `translate`, or `mixed`."
  - name: "quote_policy"
    type: "text"
    required: false
    description: "Quote policy: `translate_only` or `original_plus_translation`."
outputs:
  - name: "lesson_mdf_script"
    type: "markdown"
    required: true
    description: "Runnable single-lesson MarkdownFlow script."
  - name: "used_variables"
    type: "json"
    required: true
    description: "Variable collection and usage map for the lesson."
  - name: "depends_on_lessons"
    type: "json"
    required: true
    description: "Cross-lesson dependency metadata."
tech_stack:
  languages:
    - "markdown"
    - "yaml"
  runtime:
    - "codex-skill"
dependencies:
  internal_skills: []
  external_services: []
  api_keys_required: false
maturity: "beta"
reusability_score: 4
docs_score: 5
demo:
  type: "repo_example"
  url: "./skills/ai-shifu-lesson-script-generator/examples/minimal.md"
keywords:
  zh:
    - "lesson script generation"
    - "markdownflow prompts"
    - "teaching interaction design"
    - "variable reuse"
  en:
    - "lesson script generation"
    - "markdownflow prompts"
    - "teaching interaction design"
    - "variable reuse"
triggers:
  zh:
    - "generate markdownflow script per lesson"
    - "turn structured segments into teaching prompts"
    - "create runnable lesson script from outline"
  en:
    - "generate markdownflow script per lesson"
    - "turn structured segments into teaching prompts"
    - "create runnable lesson script from outline"
related_skills:
  - "ai-shifu-content-segmenter"
  - "ai-shifu-transcript-to-lessons"
  - "ai-shifu-lesson-script-optimizer"
aliases:
  zh:
    - "lesson script generator"
  en:
    - "lesson script generator"
owner: "ai-shifu"
license: "UNLICENSED"
last_verified_at: "2026-03-10"
